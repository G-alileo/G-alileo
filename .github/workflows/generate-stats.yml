name: Generate Profile Stats

on:
  schedule:
    - cron: "0 1 * * *"   
  workflow_dispatch:        
  push:
    branches: [main]
    paths:
      - "scripts/generate_stats.py"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_stats.py

      - name: Commit & push if changed
        run: |
          git config user.name  "G-alileo Bot"
          git config user.email "jamespmurithi@gmail.com"
          git add profile-stats.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats [skip ci]"
          git push